<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ KAIROS</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <div class="container">
        <div class="task-list-panel">
            <h2>
                Tasks
                <button id="theme-btn" class="theme-toggle-btn" onclick="toggleTheme()">☀️ Light Mode</button>
            </h2>
            <div class="add-task-form">
                <input type="text" id="new-task-input" placeholder="Add a new task..." onkeypress="handleEnter(event)">
                <button onclick="addTask()">Add</button>
            </div>
            <ul id="task-list">
                <!-- Tasks will be injected here via JS -->
            </ul>
        </div>
        <div class="matrix-panel">
            <h2>Eisenhower Matrix</h2>
            <div class="threshold-control" style="margin-bottom: 20px;">
                <label for="urgency-threshold">Urgency Threshold (days): <span id="threshold-display">3</span></label>
                <input type="range" id="urgency-threshold" min="1" max="10" value="3" 
                       oninput="document.getElementById('threshold-display').textContent = this.value; renderMatrix(currentTasks)">
            </div>
            <div class="matrix-grid">
                <div class="quadrant q1">
                    <h3>Do</h3>
                    <ul id="q1-list"></ul>
                </div>
                <div class="quadrant q2">
                    <h3>Schedule</h3>
                    <ul id="q2-list"></ul>
                </div>
                <div class="quadrant q3">
                    <h3>Delegate</h3>
                    <ul id="q3-list"></ul>
                </div>
                <div class="quadrant q4">
                    <h3>Ignore</h3>
                    <ul id="q4-list"></ul>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
